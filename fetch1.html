<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagination Example</title>
</head>
<body>
    <h1>Pagination</h1>
  <div id="div"></div>

  <button id="backBtn" onclick="backBtn()">Back</button>
  <button id="nxtBtn" onclick="nxtBtn()">Next</button>

  <script>
    let start = 0, end = 10;
    let response = [];

    function nxtBtn() {
      start += 10;
      end += 10;
      showData();
    }

    function backBtn() {
      start -= 10;
      end -= 10;
      showData();
    }

    function showData() {
      document.getElementById("div").innerHTML = "";
      for (let i = start; i < end && i < response.length; i++) {
        let newTag = document.createElement("p");
        newTag.innerHTML = response[i].title;
        document.getElementById("div").append(newTag);
      }
      document.getElementById("backBtn").disabled = start <= 0;
      document.getElementById("nxtBtn").disabled = end >= response.length;
    }

    fetch("https://jsonplaceholder.typicode.com/posts")
      .then(res => res.json())
      .then(data => {
        response = data;
        showData();
      });
  </script>
</body>
</html>
